flutter_native_splash:
  # Couleur de fond du splash screen - bleu marine élégant
  color: "#0A1628"
  
  # Couleur de fond pour le mode sombre
  color_dark: "#0A1628"
  
  # Image du logo (format PNG recommandé pour splash)
  image: assets/img/logo.png
  image_dark: assets/img/logo.png
  
  # Mode d'affichage
  android: true
  ios: true
  web: false
  
  # Configuration Android
  android_gravity: center
  android_12:
    # Pour Android 12+ (API 31+) - utilise l'icône de l'app
    image: assets/img/logo.png
    icon_background_color: "#0A1628"
    icon_background_color_dark: "#0A1628"
  
  # Configuration iOS
  ios_content_mode: center
  
  # Supprimer le splash après le chargement
  fullscreen: true
  
  # Mode sombre
  android_screen_orientation: portrait
  
  # Délai minimum d'affichage du splash (ms)
  # Cela permet de voir le splash même si l'app charge vite
  android_delay: 2000
  ios_delay: 2000
